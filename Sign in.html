<!DOCTYPE html>
<html>
    <head>
          <title>Sign in · Escrow System</title>
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
          <link rel="stylesheet" type="text/css" href="css styles.css">
          <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
          <script type="module" src="firebaseSignin.js"></script>
    </head>
    <body class="auth-page" style="background-image:url('https://i.pinimg.com/originals/a2/e7/0e/a2e70ee9920b35d55f9fc6d4b5af21aa.gif')">
        <div class="auth-card">
            <form action="" method="POST">
                <div id="signInMessage" class="messageDiv" style="display:none"></div>
                <h2>SIGN IN</h2>
                <input class="form-control" type="email" id="email" placeholder="Email" required/>
                <input class="form-control" type="password" id="password" placeholder="Password" required />
                <p><a href="#">Forgot password?</a></p>
                <button class="form-control" id="submitSignIn">Sign In</button>
                <p>Don't have an account? <a href="Sign up.html">Create an account</a></p>
            </form>
        </div>
    </body>
</html>
